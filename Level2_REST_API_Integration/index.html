<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repository Finder - REST API Integration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>🔍 GitHub Repository Finder</h1>
            <p>Recherchez les repositories les plus populaires</p>
        </header>

        <main>
            <!-- Search Section -->
            <div class="search-section">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="search-input" 
                        placeholder="Entrez un langage ou un terme (ex: javascript, react...)"
                        autocomplete="off"
                    >
                    <button id="searchBtn" class="search-btn">Rechercher</button>
                </div>
                <div class="filters">
                    <label>
                        <input type="radio" name="sort" value="stars" checked> ⭐ Plus populaires
                    </label>
                    <label>
                        <input type="radio" name="sort" value="forks"> 🍴 Plus forkés
                    </label>
                    <label>
                        <input type="radio" name="sort" value="updated"> 📅 Récemment mis à jour
                    </label>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="loading hidden">
                <div class="spinner"></div>
                <p>Recherche en cours...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" class="error hidden"></div>

            <!-- Results Section -->
            <div id="resultsSection" class="results-section hidden">
                <h2>Résultats (<span id="resultCount">0</span>)</h2>
                <div id="resultsList" class="results-list"></div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <p>👀 Commencez votre recherche pour découvrir des repositories GitHub</p>
            </div>
        </main>

        <footer>
            <p>Utilisant l'API GitHub REST • Aucune clé API requise</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
