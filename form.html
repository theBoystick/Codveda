<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peebl - Enregistrement pour une Pré-commande</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h1>Pré-commander Peebl Vision</h1>
        <p>Veuillez remplir le formulaire ci-dessous pour pré-commander vos lunettes intelligentes Peebl.</p>
        <div class="form-messages">
        <form id="preorder-form" >
        <label for="name">Nom:</label>
        <input type="text" id="name" required>
        <small class="error" id="nameError">Veuillez entrer votre nom.</small>

        <label for="email">Email:</label>
        <input type="email" id="email" required>
        <small class="error" id="emailError">Veuillez entrer une adresse email valide.</small>

        <label for="phone">Numéro de téléphone:</label>
        <input type="tel" id="phone" required>
        <small class="error" id="phoneError">Veuillez entrer un numéro de téléphone valide.</small>

        <button class="btnSubmit" type="submit">Soumettre</button>
    </form>
    </div>
</div>
</body>
</html>
